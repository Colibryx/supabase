_format_version: '2.1'
_transform: true

###
### Consumers / Users
###
consumers:
  - username: DASHBOARD
  - username: anon
    keyauth_credentials:
      - key: $SUPABASE_ANON_KEY
  - username: service_role
    keyauth_credentials:
      - key: $SUPABASE_SERVICE_KEY

###
### Access Control List
###
acls:
  - consumer: anon
    group: anon
  - consumer: service_role
    group: admin

###
### Dashboard credentials
###
basicauth_credentials:
  - consumer: DASHBOARD
    username: $DASHBOARD_USERNAME
    password: $DASHBOARD_PASSWORD



###
### Upstreams
###
upstreams:
  - name: fastify-cluster
    algorithm: round-robin
    targets:
      - target: fastify_api:11000
        weight: 1
      - target: fastify_api_backup:11000
        weight: 1
    healthchecks:
      active:
        type: http
        http_path: "/api/health"
        timeout: 1
        concurrency: 2
        healthy:
          interval: 5
          successes: 1 # Basta 1 successo per tornare online
        unhealthy:
          interval: 1 # Controllo frequente per rilevare subito il crash
          tcp_failures: 1
          http_failures: 1
          http_statuses: [503, 500, 502, 504] # Se riceve 503 (dal nostro /sys/drain), stacca subito.

###
### API Routes
###
services:
  ## -----------------------------------------------------------------------
  ## 1. NUOVO SERVIZIO: ROBOTS.TXT (Blocca i crawler)
  ## -----------------------------------------------------------------------
  - name: robots-txt
    url: http://localhost
    routes:
      - name: robots-txt-route
        paths:
          - /robots.txt
        strip_path: false
    plugins:
      - name: request-termination
        config:
          status_code: 200
          content_type: text/plain
          body: |
            User-agent: *
            Disallow: /
  ## Open Auth routes
  - name: auth-v1-open
    url: http://auth:9999/verify
    routes:
      - name: auth-v1-open
        strip_path: true
        paths:
          - /auth/v1/verify
    plugins:
      - name: cors
  - name: auth-v1-open-callback
    url: http://auth:9999/callback
    routes:
      - name: auth-v1-open-callback
        strip_path: true
        paths:
          - /auth/v1/callback
    plugins:
      - name: cors
  - name: auth-v1-open-authorize
    url: http://auth:9999/authorize
    routes:
      - name: auth-v1-open-authorize
        strip_path: true
        paths:
          - /auth/v1/authorize
    plugins:
      - name: cors

  ## Secure Auth routes
  - name: auth-v1
    _comment: 'GoTrue: /auth/v1/* -> http://auth:9999/*'
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Secure REST routes
  - name: rest-v1
    _comment: 'PostgREST: /rest/v1/* -> http://rest:3000/*'
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
      - name: response-transformer
        config:
          add:
            headers:
              - X-Robots-Tag:noindex

  ## Secure GraphQL routes
  - name: graphql-v1
    _comment: 'PostgREST: /graphql/v1/* -> http://rest:3000/rpc/graphql'
    url: http://rest:3000/rpc/graphql
    routes:
      - name: graphql-v1-all
        strip_path: true
        paths:
          - /graphql/v1
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: true
      - name: request-transformer
        config:
          add:
            headers:
              - Content-Profile:graphql_public
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon

  ## Secure Realtime routes
  - name: realtime-v1-ws
    _comment: 'Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*'
    url: http://realtime-dev.supabase-${PROJECT_NAME}-realtime:4000/socket
    # url: http://realtime:4000/socket
    protocol: ws
    routes:
      - name: realtime-v1-ws
        strip_path: true
        paths:
          - /realtime/v1/
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
  - name: realtime-v1-rest
    _comment: 'Realtime: /realtime/v1/* -> ws://realtime:4000/socket/*'
    url: http://realtime-dev.supabase-${PROJECT_NAME}-realtime:4000/api
    # url: http://realtime:4000/api
    protocol: http
    routes:
      - name: realtime-v1-rest
        strip_path: true
        paths:
          - /realtime/v1/api
    plugins:
      - name: cors
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin
            - anon
  ## Storage routes: the storage server manages its own auth
  - name: storage-v1
    _comment: 'Storage: /storage/v1/* -> http://storage:5000/*'
    url: http://storage:5000/
    routes:
      - name: storage-v1-all
        strip_path: true
        paths:
          - /storage/v1/
    plugins:
      - name: cors
      - name: response-transformer
        config:
          add:
            headers:
              - X-Robots-Tag:noindex

  ## Edge Functions routes
  - name: functions-v1
    _comment: 'Edge Functions: /functions/v1/* -> http://functions:9000/*'
    url: http://functions:9000/
    routes:
      - name: functions-v1-all
        strip_path: true
        paths:
          - /functions/v1/
    plugins:
      - name: cors

  ## Analytics routes
  - name: analytics-v1
    _comment: 'Analytics: /analytics/v1/* -> http://logflare:4000/*'
    url: http://analytics:4000/
    routes:
      - name: analytics-v1-all
        strip_path: true
        paths:
          - /analytics/v1/

  ## Secure Database routes
  - name: meta
    _comment: 'pg-meta: /pg/* -> http://pg-meta:8080/*'
    url: http://meta:8080/
    routes:
      - name: meta-all
        strip_path: true
        paths:
          - /pg/
    plugins:
      - name: key-auth
        config:
          hide_credentials: false
      - name: acl
        config:
          hide_groups_header: true
          allow:
            - admin

  ## Protected Dashboard - catch all remaining routes
  - name: dashboard
    _comment: 'Studio: /* -> http://studio:3000/*'
    url: http://studio:3000/
    routes:
      - name: dashboard-all
        strip_path: true
        paths:
          - /
    plugins:
      - name: cors
      - name: basic-auth
        config:
          hide_credentials: true
  ## Fastify Functions routes
  - name: fastify-v1
    _comment: 'FASTIFY Functions: /fastify/* -> http://172.17.0.1:11000/*'
    host: fastify-cluster
    routes:
      - name: fastify-v1-all
        strip_path: true
        paths:
          - /fastify/
    plugins:
      - name: cors
  ## Fastify Whatsapp routes
  - name: fastify-whatsapp-v1
    _comment: 'FASTIFY Functions: /fastify/* -> http://172.17.0.1:11000/*'
    # url: http://172.17.0.1:11000/
    url: http://fastify_whatsapp:11000/
    routes:
      - name: fastify-whatsapp-v1-all
        strip_path: true
        paths:
          - /whatsapp/
    plugins:
      - name: cors
  ## TRPC Docs routes
  - name: trpc-docs-v1
    _comment: 'TRPC Docs: /docs/* -> http://172.17.0.1:11000/*'
    host: fastify-cluster
    routes:
      - name: trpc-docs-all
        strip_path: false
        paths:
          - /docs/
    plugins:
      - name: cors

